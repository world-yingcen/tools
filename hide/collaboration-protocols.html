<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計與開發協作規範 SOP</title>
    <style>
        :root {
            /* 專業配色系統 */
            --primary-color: #2c3e50;
            /* 深藍 */
            --secondary-color: #34495e;
            /* 次深藍 */
            --accent-color: #48b6ff;
            /* 亮藍 */
            --text-color: #333333;
            /* 深灰 */
            --text-light: #ecf0f1;
            /* 淺灰 */
            --bg-color: #f4f6f9;
            /* 淺灰背景 */
            --card-front-bg: #ffffff;
            --quote-bg: rgba(52, 152, 219, 0.15);
            /* 回覆範本背景 */
            --quote-border: #3498db;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --card-hover-shadow: 0 10px 15px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首設計 */
        header {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 40px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #666;
            font-size: 16px;
        }

        /* 網格系統 */
        .sop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 85%;
        }

        /* 卡片容器 */
        .card-container {
            background-color: transparent;
            width: 100%;
            height: 500px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* 卡片本體 */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: left;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 8px;
        }

        .card-container:hover .card {
            box-shadow: var(--card-hover-shadow);
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* === 正面樣式 (索引) === */
        .card-front {
            background-color: var(--card-front-bg);
            color: var(--primary-color);
            border-top: 4px solid var(--accent-color);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-index {
            font-size: 48px;
            font-weight: 900;
            color: #e0e6ed;
            position: absolute;
            top: 20px;
            right: 20px;
            line-height: 1;
        }

        .card-title-group {
            margin-top: 40px;
        }

        .card-category {
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #95a5a6;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 26px;
            font-weight: bold;
            line-height: 1.4;
            color: var(--primary-color);
        }

        .card-action {
            margin-top: auto;
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .card-action::after {
            content: '→';
            margin-left: 5px;
            transition: transform 0.3s;
        }

        .card-container:hover .card-action::after {
            transform: translateX(5px);
        }

        /* === 背面樣式 (詳情) === */
        .card-back {
            background-color: var(--primary-color);
            color: var(--text-light);
            transform: rotateY(180deg);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .back-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .back-content {
            font-size: 18px;
            line-height: 1.6;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .back-content ul,
        .back-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .back-content li {
            margin-bottom: 6px;
        }

        .important-note {
            background-color: rgba(231, 76, 60, 0.2);
            border-left: 3px solid #e74c3c;
            padding: 8px;
            margin-top: 10px;
            font-size: 15px;
            color: #ffcccc;
        }

        /* === 建議回覆區塊樣式 === */
        .response-box {
            background-color: var(--quote-bg);
            border: 1px dashed var(--quote-border);
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            font-family: "Menlo", "Monaco", "Consolas", monospace;
            font-size: 15px;
            color: #dbeeff;
            white-space: pre-line;
            /* 保留換行 */
        }

        .response-title {
            font-size: 14px;
            color: #8ecae6;
            margin-bottom: 5px;
            font-weight: bold;
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .response-title::before {
            content: '💬';
            margin-right: 5px;
        }

        /* 連結樣式 (在深色背景中) */
        .response-box a {
            color: #8ecae6;
            text-decoration: underline;
        }

        /* 捲軸美化 */
        .back-content::-webkit-scrollbar {
            width: 4px;
        }

        .back-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .back-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .sop-grid {
                grid-template-columns: 1fr;
            }

            .card-container {
                height: 450px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>設計與開發協作規範</h1>
    </header>

    <div class="sop-grid" id="gridContainer">
        <!-- 內容將由 JavaScript 動態生成 -->
    </div>

    <script>
        const sopData = [

        const grid = document.getElementById('gridContainer');

        sopData.forEach(item => {
            const cardContainer = document.createElement('div');
            cardContainer.className = 'card-container';

            cardContainer.innerHTML = `
                <div class="card">
                    <div class="card-face card-front">
                        <div class="card-index">${item.id}</div>
                        <div class="card-title-group">

                        </div>

                    </div>

                        <div class="back-content">

                        </div>
                    </div>

                const card = this.querySelector('.card');
                card.classList.toggle('is-flipped');
            });

            grid.appendChild(cardContainer);
        });
    </script>
</body>
